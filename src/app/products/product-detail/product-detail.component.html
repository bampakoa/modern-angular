<div>
  <h2>Product Details</h2>
  <h3>{{selectedProduct().name}}</h3>
  <span>{{selectedProduct().price | currency:'EUR'}}</span>
  <button mat-raised-button color="primary" (click)="changePrice(selectedProduct())">Change</button>
  <p>
    @if (authService.isLoggedIn()) {
      <button mat-button (click)="buy(selectedProduct())">Buy Now</button>
    }
    <button mat-raised-button color="primary" class="delete" (click)="remove(selectedProduct())">Delete</button>
  </p>
</div>
