<mat-list cdkDropList (cdkDropListDropped)="reorder($event)">
  @for (product of products; track product) {
    <mat-list-item cdkDrag>
      {{product.name}}
    </mat-list-item>
  }
</mat-list>

<mat-selection-list>
  @for (product of products; track product) {
    <mat-list-option>
      {{product.name}}
    </mat-list-option>
  }
</mat-selection-list>

<mat-grid-list cols="3" rowHeight="100px" gutterSize="50">
  @for (product of products; track product) {
    <mat-grid-tile>
      {{product.name}}
    </mat-grid-tile>
  }
</mat-grid-list>
